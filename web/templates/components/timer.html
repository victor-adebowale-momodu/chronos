<div x-data="timer()">
    <div>
        <span x-text="formatTime()"></span>
        <button x-show="timerState !== TimerState.IDLE" @click="onReset()">
            reset
        </button>
    </div>
    <div>
        <button @click="onPlayOrPause()">
            <span
                x-text="timerState === TimerState.RUNNING ? 'pause' : 'play'"
            ></span>
        </button>
        <button @click="addTime()">+1:00</button>
    </div>
</div>
