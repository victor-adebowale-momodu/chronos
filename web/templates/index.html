<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ChronOS</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
        />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
        />

        <link rel="stylesheet" href="/static/styles.css" />
        <script type="module" src="/static/js/app.js"></script>
    </head>

    <body x-data>
        <nav class="navbar">
            <div class="navbar-logo">
                <span class="material-symbols-outlined"> hourglass </span>
                <p class="navbar-title">CHRONOS</p>
            </div>

            <template x-if="!$store.auth.user && !$store.auth.loading">
                <span class="material-symbols-outlined"> account_circle </span>
            </template>

            <template x-if="$store.auth.user">
                <div class="user-initials"><p>VAM</p></div>
            </template>
        </nav>

        <div class="timer-circle">
            <p class="timer-text" x-text="$store.timer.format"></p>
        </div>

        <div class="btn-group">
            <template x-if="$store.timer.state === 'idle'">
                <button class="btn-add" @click="$store.timer.addToTimer()">
                    <span class="material-symbols-outlined"> add </span> 1min
                </button>
            </template>

            <template x-if="$store.timer.state !== 'idle'">
                <button class="btn-add" @click="$store.timer.reset()">
                    <span class="material-symbols-outlined"> replay </span>
                    Reset
                </button>
            </template>

            <button
                class="btn-start"
                @click="$store.timer.state === 'running' ? $store.timer.pause() : $store.timer.start()"
            >
                <span
                    class="material-symbols-outlined"
                    x-text="$store.timer.state === 'running' ? 'pause' : 'play_arrow'"
                ></span>
                <span
                    x-text="$store.timer.state === 'running' ? 'Pause' : 'Play'"
                ></span>
            </button>
        </div>

        <div class="stats">
            <span class="material-symbols-outlined stats-icon">
                equalizer
            </span>
            <div class="stats-text">
                <p class="stats-sessions">4 sessions</p>
                <p class="stats-time">1h 40m</p>
            </div>
            <button class="stats-expand">
                <span class="material-symbols-outlined"> expand_content </span>
            </button>
        </div>

        <button class="status-badge">
            <div class="status-dot"></div>
            <span>Last Synced: yesterday</span>
        </button>
    </body>
</html>
