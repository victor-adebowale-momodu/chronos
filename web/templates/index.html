<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />i
        <title>ChronOS</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
        />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
        />

        <link rel="stylesheet" href="/static/styles.css" />
        <script type="module" src="/static/js/app.js"></script>
    </head>

    <body>
        <nav class="navbar">
            <div class="navbar-logo">
                <span class="material-symbols-outlined"> hourglass </span>
                <p class="navbar-title">CHRONOS</p>
            </div>
            <span class="material-symbols-outlined"> account_circle </span>
        </nav>

        <div class="timer-circle">
            <p class="timer-text">25:00</p>
        </div>

        <div class="btn-group">
            <button class="btn-add">
                <span class="material-symbols-outlined"> add </span>1min
            </button>
            <button class="btn-start">
                <span class="material-symbols-outlined"> play_arrow </span>Start
            </button>
        </div>
    </body>
</html>
