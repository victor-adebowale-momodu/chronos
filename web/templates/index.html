<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ChronOS</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
        />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
        />

        <link rel="stylesheet" href="/static/styles.css" />
        <script type="module" src="/static/js/app.js"></script>
    </head>

    <body x-data>
        <!--Navbar-->
        <nav class="navbar">
            <div class="navbar-logo">
                <span class="material-symbols-outlined"> hourglass </span>
                <p class="navbar-title">CHRONOS</p>
            </div>

            <template x-if="!$store.auth.user && !$store.auth.loading">
                <div>
                    <button
                        class="unauthenticated-user"
                        @click="$dispatch('auth-modal')"
                    >
                        <span class="material-symbols-outlined">
                            account_circle
                        </span>
                    </button>
                </div>
            </template>

            <template x-if="$store.auth.user">
                <div class="user-initials"><p>VAM</p></div>
            </template>
        </nav>

        <!--Timer-->
        <div class="timer-circle">
            <p class="timer-text" x-text="$store.timer.format"></p>
        </div>

        <!--Timer Controls-->
        <div class="btn-group">
            <template x-if="$store.timer.state === 'idle'">
                <button class="btn-add" @click="$store.timer.addToTimer()">
                    <span class="material-symbols-outlined"> add </span> 1min
                </button>
            </template>

            <template x-if="$store.timer.state !== 'idle'">
                <button class="btn-add" @click="$store.timer.reset()">
                    <span class="material-symbols-outlined"> replay </span>
                    Reset
                </button>
            </template>

            <button
                class="btn-start"
                @click="$store.timer.state === 'running' ? $store.timer.pause() : $store.timer.start()"
            >
                <span
                    class="material-symbols-outlined"
                    x-text="$store.timer.state === 'running' ? 'pause' : 'play_arrow'"
                ></span>
                <span
                    x-text="$store.timer.state === 'running' ? 'Pause' : 'Play'"
                ></span>
            </button>
        </div>

        <!--Stats-->
        <div class="stats">
            <span class="material-symbols-outlined stats-icon">
                equalizer
            </span>
            <div class="stats-text">
                <p class="stats-sessions">4 sessions</p>
                <p class="stats-time">1h 40m</p>
            </div>
            <button class="stats-expand">
                <span class="material-symbols-outlined"> expand_content </span>
            </button>
        </div>

        <!--Sync Status-->
        <button class="status-badge">
            <div class="status-dot"></div>
            <span>Last Synced: yesterday</span>
        </button>

        <!--Modals-->
        <!--Authentication Modal-->
        <div
            class="modal-overlay"
            x-data="{ isOpen: false }"
            x-show="isOpen"
            @auth-modal.window="isOpen = true"
        >
            <div class="modal-content" @click.outside="isOpen = false">
                <!--Modal Header-->
                <div class="modal-header">
                    <span class="modal-title">Sync Your Sessions</span>
                    <button class="stats-expand" @click="isOpen = false">
                        <span class="material-symbols-outlined"> close </span>
                    </button>
                </div>

                <div x-data="{ page: 'signup' }">
                    <!--Signup Form-->
                    <template x-if="page === 'signup'">
                        <div x-data="signupData()">
                            <form
                                class="auth-form"
                                action="/auth/register"
                                method="POST"
                                @submit.prevent="submit"
                            >
                                <div class="input-group">
                                    <label for="email">Email</label>
                                    <input
                                        type="email"
                                        id="email"
                                        x-model="formData.email"
                                        required
                                    />
                                </div>

                                <div class="input-group">
                                    <label for="password">Password</label>
                                    <input
                                        type="password"
                                        id="password"
                                        x-model="formData.password"
                                        required
                                    />
                                </div>

                                <div class="input-group">
                                    <label for="confirmPassword"
                                        >Confirm Password</label
                                    >
                                    <input
                                        type="password"
                                        id="confirmPassword"
                                        name="confirmPassword"
                                        x-model="formData.confirmPassword"
                                        required
                                    />
                                </div>

                                <button type="submit" class="btn-start">
                                    Sign Up
                                </button>

                                <div class="separator">
                                    <span class="separator-line"></span>
                                    <span class="separator-text">OR</span>
                                    <span class="separator-line"></span>
                                </div>

                                <button class="btn-continue">
                                    <svg viewBox="0 0 24 24">
                                        <title>Google</title>
                                        <path
                                            d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"
                                        />
                                    </svg>
                                    Continue with Google
                                </button>

                                <button class="btn-continue">
                                    <svg viewBox="0 0 24 24">
                                        <title>GitHub</title>
                                        <path
                                            d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"
                                        />
                                    </svg>
                                    Continue with GitHub
                                </button>
                            </form>
                        </div>
                    </template>

                    <!--Login Form-->
                    <template x-if="page === 'login'">
                        <div x-data="loginData()">
                            <form
                                class="auth-form"
                                action="/auth/login"
                                method="POST"
                                @submit.prevent="submit"
                            >
                                <div class="input-group">
                                    <label for="email">Email</label>
                                    <input
                                        type="email"
                                        id="email"
                                        x-model="formData.email"
                                        required
                                    />
                                </div>

                                <div class="input-group">
                                    <label for="password">Password</label>
                                    <input
                                        type="password"
                                        id="password"
                                        x-model="formData.password"
                                        required
                                    />
                                </div>

                                <button type="submit" class="btn-start">
                                    Log In
                                </button>

                                <div class="separator">
                                    <span class="separator-line"></span>
                                    <span class="separator-text">OR</span>
                                    <span class="separator-line"></span>
                                </div>

                                <button class="btn-continue">
                                    <svg viewBox="0 0 24 24">
                                        <title>Google</title>
                                        <path
                                            d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"
                                        />
                                    </svg>
                                    Continue with Google
                                </button>

                                <button class="btn-continue">
                                    <svg viewBox="0 0 24 24">
                                        <title>GitHub</title>
                                        <path
                                            d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"
                                        />
                                    </svg>
                                    Continue with GitHub
                                </button>
                            </form>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </body>
</html>
