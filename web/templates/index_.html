<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>ChronOS</title>

        <link rel="stylesheet" href="/static/styles.css" />
        <script type="module" src="/static/js/app.js"></script>
    </head>

    <body x-data>
        <nav>
            <template x-if="$store.auth.user">
                <div>
                    <span x-text="$store.auth.user.full_name"></span>
                    <a href="/data">Data</a>
                    <button @click="$store.auth.logout()">Logout</button>
                </div>
            </template>

            <template x-if="!$store.auth.user && !$store.auth.loading">
                <div>
                    <a href="/login">Login</a>
                    <a href="/signup">Signup</a>
                </div>
            </template>
        </nav>

        <div>
            <div>
                <span x-text="$store.timer.format"></span>
                <button
                    x-show="$store.timer.state !== 'idle'"
                    @click="$store.timer.reset()"
                >
                    reset
                </button>
            </div>

            <div>
                <button
                    @click="$store.timer.state === 'running' ? $store.timer.pause() : $store.timer.start()"
                >
                    <span
                        x-text="$store.timer.state === 'running' ? 'pause' : 'play'"
                    ></span>
                </button>

                <button
                    @click="$store.timer.addToTimer()"
                    x-show="$store.timer.state === 'idle'"
                >
                    +1:00
                </button>
            </div>
        </div>
    </body>
</html>
