<div class="timer">
    <div class="timer-circle">
        <p class="timer-text"></p>
    </div>

    <div class="btn-group">
        <button type="button" id="btn-timer-modify" class="btn-timer">
            <span data-template="add"></span>
            <span>1min</span>
        </button>

        <button type="button" id="btn-timer-toggle" class="btn-timer">
            <span data-template="playArrow"></span>
            <span>Play</span>
        </button>
    </div>
</div>
