<div class="timer">
    <div class="timer-circle">
        <p class="timer-text">25:00</p>
    </div>

    <div class="btn-group">
        <button id="btn-timer-add" class="btn-timer">
            {{add}}<span>1min</span>
        </button>
        <button id="btn-timer-toggle" class="btn-timer">
            {{playArrow}}<span>Play</span>
        </button>
    </div>
</div>
