<form id="login-form" class="auth-form" action="/auth/login" method="POST">
    <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" required />
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" required />
    </div>

    <button type="submit" class="btn-start">Log In</button>

    <div class="auth-switch">
        <span>Already have an account? Go to</span>
        <button id="btn-goto-signup" type="button" class="btn-link">
            Signup
        </button>
    </div>
</form>
