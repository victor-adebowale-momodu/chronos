<div class="modal-overlay">
    <div class="modal-content">
        <div class="stats-modal-header">
            <button id="btn-week-prev" class="stats-expand">
                {{chevronLeft}}
            </button>
            <span>Apr 1 - Apr 7</span>
            <button id="btn-week-next" class="stats-expand">
                {{chevronRight}}
            </button>
        </div>

        <div class="stats-summary">
            <div class="stats-card">
                <p class="stat">Sessions</p>
                <p class="stat-value">
                    6<span class="stat-unit">count</span>
                </p>
            </div>
            <div class="stats-card">
                <p class="stat">Total Time</p>
                <p class="stat-value">
                    2.5<span class="stat-unit">hours</span>
                </p>
            </div>
        </div>

        <div class="stats-chart-wrapper">
            <canvas id="stats-chart"></canvas>
        </div>

        <button id="btn-stats-modal-close" class="btn-start close-btn">
            Close
        </button>
    </div>
</div>
