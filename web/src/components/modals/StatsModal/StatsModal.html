<div class="modal-overlay">
    <div class="modal-content">
        <div class="stats-modal-header">
            <button type="button" id="btn-week-prev" class="stats-expand">
                <span data-template="chevronLeft"></span>
            </button>
            <span>Apr 1 - Apr 7</span>
            <button type="button" id="btn-week-next" class="stats-expand">
                <span data-template="chevronRight"></span>
            </button>
        </div>

        <div class="stats-summary">
            <div class="stats-card">
                <p class="stat">Sessions</p>
                <p class="stat-value">6<span class="stat-unit">count</span></p>
            </div>
            <div class="stats-card">
                <p class="stat">Total Time</p>
                <p class="stat-value">
                    2.5<span class="stat-unit">hours</span>
                </p>
            </div>
        </div>

        <div class="stats-chart-wrapper">
            <canvas id="stats-chart"></canvas>
        </div>

        <button
            type="button"
            id="btn-stats-modal-close"
            class="btn-start close-btn"
        >
            Close
        </button>
    </div>
</div>
