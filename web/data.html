<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>ChronOS</title>

        <script
            defer
            src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
        ></script>

        <style>
            body {
                margin: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                font-family: sans-serif;
            }
        </style>
    </head>

    <body x-data>
        <nav x-init="$store.auth.checkSession()">
            <template x-if="$store.auth.user">
                <div>
                    <span
                        >Welcome,
                        <span x-text="$store.auth.user.full_name"></span
                    ></span>
                    <button @click="$store.auth.logout()">Logout</button>
                </div>
            </template>

            <template x-if="!$store.auth.user && !$store.auth.loading">
                <div>
                    <a href="/login">Login</a>
                    <a href="/signup">Signup</a>
                </div>
            </template>
        </nav>

        <div></div>

        <script>
            const api = {
                async getSessions(payload) {
                    const response = await fetch("/sessions");
                    if (!response.ok) throw new Error("Sessions not retrieved");
                    return response;
                },
            };

            document.addEventListener("alpine:init", () => {
                Alpine.store("sessions", {
                    
                });
            });
        </script>
    </body>
</html>
