<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>ChronOS</title>

        <script
            defer
            src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
        ></script>

        <style>
            body {
                margin: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                font-family: sans-serif;
            }
        </style>
    </head>

    <body>
        <script>
            const api = {
                async getMe() {
                    try {
                        const res = await fetch("/users/me");
                        if (!res.ok) return null;
                        return res.json();
                    } catch {
                        return null;
                    }
                },

                async logout() {
                    try {
                        await fetch("/auth/logout", { method: "POST" });
                        return true;
                    } catch {
                        return false;
                    }
                },
            };
            
            

            Alpine.store("auth", {
                user: null,
                loading: true,

                async checkSession() {
                    this.user = await api.getMe();
                    this.loading = false;
                },

                async logout() {
                    await api.logout();
                    this.user = null;
                    window.location.reload();
                },
            });
        </script>
    </body>
</html>
