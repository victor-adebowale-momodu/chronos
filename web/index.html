<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>ChronOS</title>

        <script
            defer
            src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
        ></script>

        <style>
            body {
                margin: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
            }
        </style>
    </head>

    <body>
        <nav x-data="auth" x-init="checkSession()">
            <template x-if="user">
                <div>
                    <span>Welcome, <span x-text="user.full_name"></span></span>
                    <button @click="logout()">Logout</button>
                </div>
            </template>

            <template x-if="!user && !loading">
                <div>
                    <a href="/login">Login</a>
                    <a href="/signup">Signup</a>
                </div>
            </template>
        </nav>

        <div x-data="timer()">
            <div>
                <span x-text="formatTime()"></span>
                <button
                    x-show="timerState !== TimerState.IDLE"
                    @click="onReset()"
                >
                    reset
                </button>
            </div>

            <div>
                <button @click="onPlayOrPause()">
                    <span
                        x-text="timerState === TimerState.RUNNING ? 'pause' : 'play'"
                    ></span>
                </button>

                <button
                    @click="addTime()"
                    x-show="timerState === TimerState.IDLE"
                >
                    +1:00
                </button>
            </div>
        </div>

        <script>
            const DEFAULT_DURATION_SECS = 25 * 60;
            const INCREMENT_SECS = 60;
            const SESSION_STORAGE_KEY = "chronos_storage";
            const TIMER_STORAGE_KEY = "chronos_timer";
            
            
            const TimerState = Object.freeze({
                IDLE: "idle",
                RUNNING: "running",
                PAUSED: "paused",
            });

            document.addEventListener("alpine:init", () => {
                Alpine.data("auth", () => ({
                    user: null,
                    loading: true,

                    init() {
                        this.checkSession();
                    },

                    async checkSession() {
                        try {
                            const response = await fetch("/users/me");
                            if (response.ok) this.user = await response.json();
                        } catch (err) {
                            console.error("Auth check failed", err);
                        } finally {
                            this.loading = false;
                        }
                    },

                    async logout() {
                        await fetch("/auth/logout", { method: "POST" });
                        window.location.reload();
                    },
                }));

                Alpine.data("timer", () => ({
                    seconds: DEFAULT_DURATION_SECS,
                    timerState: TimerState.IDLE,
                    _interval: null,

                    init() {
                        const timerData = this._loadTimerData();
                        if (timerData) {
                            this.seconds = timerData.seconds;
                            if (timerData.timerState === TimerState.RUNNING) {
                                this._startTimer();
                            }
                        }

                        this.$watch("seconds", (val) =>
                            this._saveTimerData(val, this.timerState),
                        );
                        this.$watch("timerState", (val) =>
                            this._saveTimerData(this.seconds, val),
                        );
                    },

                    _saveTimerData(seconds, timerState) {
                        localStorage.setItem(
                            TIMER_STORAGE_KEY,
                            JSON.stringify({ seconds, timerState }),
                        );
                    },

                    _loadTimerData() {
                        const timerData = localStorage.getItem(TIMER_STORAGE_KEY);
                        return timerData ? JSON.parse(timerData) : null;
                    },

                    onPlayOrPause() {
                        this.timerState === TimerState.RUNNING
                            ? this._pauseTimer()
                            : this._startTimer();
                    },

                    onReset() {
                        this._clearInterval();
                        this.timerState = TimerState.IDLE;
                        this.seconds = DEFAULT_DURATION_SECS;
                    },

                    addTime() {
                        this.seconds += INCREMENT_SECS;
                    },

                    formatTime() {
                        const minutes = String(
                            Math.floor(this.seconds / 60),
                        ).padStart(2, "0");
                        const secs = String(this.seconds % 60).padStart(2, "0");
                        return `${minutes}:${secs}`;
                    },

                    _startTimer() {
                        this.timerState = TimerState.RUNNING;
                        this._interval = setInterval(() => {
                            if (this.seconds > 0) {
                                this.seconds--;
                            } else {
                                alert("Time is up!");
                                this.onReset();
                            }
                        }, 1000);
                    },

                    _pauseTimer() {
                        this.timerState = TimerState.PAUSED;
                        this._clearInterval();
                    },

                    _clearInterval() {
                        clearInterval(this._interval);
                        this._interval = null;
                    },

                    _startSession() {},
                    
                    _endSession() {},
                }));
            });
        </script>
    </body>
</html>
