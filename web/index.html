<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>ChronOS</title>

        <script
            defer
            src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
        ></script>

        <style>
            body {
                margin: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                font-family: sans-serif;
            }
        </style>
    </head>

    <body x-data>
        <nav x-init="$store.auth.checkSession()">
            <template x-if="$store.auth.user">
                <div>
                    <span
                        >Welcome,
                        <span x-text="$store.auth.user.full_name"></span
                    ></span>
                    <button @click="$store.auth.logout()">Logout</button>
                </div>
            </template>

            <template x-if="!$store.auth.user && !$store.auth.loading">
                <div>
                    <a href="/login">Login</a>
                    <a href="/signup">Signup</a>
                </div>
            </template>
        </nav>

        <div>
            <div>
                <span x-text="$store.timer.format"></span>
                <button
                    x-show="$store.timer.state !== 'idle'"
                    @click="$store.timer.reset()"
                >
                    reset
                </button>
            </div>

            <div>
                <button
                    @click="$store.timer.state === 'running' ? $store.timer.pause() : $store.timer.start()"
                >
                    <span
                        x-text="$store.timer.state === 'running' ? 'pause' : 'play'"
                    ></span>
                </button>

                <button
                    @click="$store.timer.addToTimer()"
                    x-show="$store.timer.state === 'idle'"
                >
                    +1:00
                </button>
            </div>
        </div>

        <script>
            const DEFAULT_DURATION_SECS = 25 * 60;
            const INCREMENT_DURATION_SECS = 60;

            const api = {
                async getMe() {
                    const response = await fetch("/users/me");
                    if (!response.ok) throw new Error("User not authenticated");
                    return response;
                },

                async logout() {
                    await fetch("/auth/logout", { method: "POST" });
                },
            };

            document.addEventListener("alpine:init", () => {
                Alpine.store("auth", {
                    user: null,
                    loading: true,

                    async checkSession() {
                        this.user = await api.getMe();
                        this.loading = false;
                    },

                    async logout() {
                        await api.logout();
                        this.user = null;
                        window.location.reload();
                    },
                });

                Alpine.store("timer", {
                    seconds: Number(
                        localStorage.getItem("chronos_seconds") ??
                            DEFAULT_DURATION_SECS,
                    ),
                    state: localStorage.getItem("chronos_state") ?? "idle",
                    _interval: null,

                    init() {
                        if (this.state === "running") {
                            this.start();
                        }
                    },

                    _save() {
                        localStorage.setItem("chronos_seconds", this.seconds);
                        localStorage.setItem("chronos_state", this.state);
                    },

                    start() {
                        if (this._interval) clearInterval(this._interval);
                        this.state = "running";
                        this._save();

                        this._interval = setInterval(() => {
                            if (this.seconds > 0) {
                                this.seconds--;
                                this._save();
                            } else {
                                this.reset();
                                alert("Time is up!");
                            }
                        }, 1000);
                    },

                    pause() {
                        this.state = "paused";
                        this._save();
                        clearInterval(this._interval);
                        this._interval = null;
                    },

                    reset() {
                        this.pause();
                        this.state = "idle";
                        this.seconds = DEFAULT_DURATION_SECS;
                        this._save();
                    },

                    addToTimer() {
                        this.seconds += INCREMENT_DURATION_SECS;
                    },

                    get format() {
                        const mins = String(
                            Math.floor(this.seconds / 60),
                        ).padStart(2, "0");
                        const secs = String(this.seconds % 60).padStart(2, "0");
                        return `${mins}:${secs}`;
                    },
                });
            });
        </script>
    </body>
</html>
